site_name: Filigree
site_description: Local-first issue tracker designed for AI coding agents — SQLite, MCP tools, no cloud, no accounts.
site_url: https://filigree.foundryside.dev
repo_url: https://github.com/tachyon-beep/filigree
repo_name: tachyon-beep/filigree
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: amber
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

exclude_docs: |
  README.md
  bugs/
  plans/
  superpowers/
  architecture/decisions/
  architecture/templates.md
  concepts/architecture_scanner_synthesis.md
  examples/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Architecture: architecture.md
      - Workflow templates: workflows.md
      - File traceability: file-traceability.md
      - Architecture scanner: concepts/architecture_scanner.md
  - Guides:
      - Agent integration: agent-integration.md
  - Reference:
      - CLI: cli.md
      - MCP server: mcp.md
      - Python API: api-reference.md
  - Federation:
      - Contracts: federation/contracts.md
      - Registry backend runbook: federation/registry-backend-launch-runbook.md
  - Migrating &amp; upgrading:
      - From Beads: MIGRATION.md
      - Upgrading: UPGRADING.md
      - Schema migrations: SCHEMA_MIGRATIONS.md
  - About:
      - Changelog: https://github.com/tachyon-beep/filigree/blob/main/CHANGELOG.md
      - Contributing: https://github.com/tachyon-beep/filigree/blob/main/CONTRIBUTING.md
      - License: https://github.com/tachyon-beep/filigree/blob/main/LICENSE
