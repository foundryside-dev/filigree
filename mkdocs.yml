site_name: Filigree
site_description: Local-first issue tracker designed for AI coding agents — SQLite, MCP tools, no cloud, no accounts.
site_url: https://filigree.foundryside.dev
repo_url: https://github.com/foundryside-dev/filigree
repo_name: foundryside-dev/filigree
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    # Dark-first: slate is listed first, so it is the default scheme. primary/
    # accent are `custom` so Material paints no colour of its own — the vendored
    # weft-mkdocs.css owns --md-primary/--md-accent (= the suite's dyed-amber
    # accent); the Filigree identity layer (extra.css) repaints links/accent to
    # the sky thread on Filigree pages.
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  # Bundled JetBrains Mono + Space Grotesk (vendored in stylesheets/fonts/ via
  # weft-mkdocs.css) own typography now — disable Material's Google Fonts.
  font: false
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  # Shared Weft Federation docs theme (vendored) first, Filigree identity layer
  # on top.
  - stylesheets/weft-mkdocs.css
  - stylesheets/extra.css

exclude_docs: |
  README.md
  bugs/
  plans/
  superpowers/
  architecture/decisions/
  architecture/templates.md
  concepts/architecture_scanner_synthesis.md
  examples/

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Architecture: architecture.md
      - Workflow templates: workflows.md
      - File traceability: file-traceability.md
      - Architecture scanner: concepts/architecture_scanner.md
  - Guides:
      - Agent integration: agent-integration.md
  - Reference:
      - CLI: cli.md
      - MCP server: mcp.md
      - Python API: api-reference.md
  - Federation:
      - Filigree in the Weft Federation: federation/index.md
      - Contracts: federation/contracts.md
      - Registry backend runbook: federation/registry-backend-launch-runbook.md
  - Migrating &amp; upgrading:
      - 3.0 consumer migration: MIGRATION-3.0.md
      - From Beads: MIGRATION.md
      - Upgrading: UPGRADING.md
      - Schema migrations: SCHEMA_MIGRATIONS.md
  - About:
      - Changelog: https://github.com/foundryside-dev/filigree/blob/main/CHANGELOG.md
      - Contributing: https://github.com/foundryside-dev/filigree/blob/main/CONTRIBUTING.md
      - License: https://github.com/foundryside-dev/filigree/blob/main/LICENSE
