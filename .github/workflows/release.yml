name: Release

on:
  push:
    tags: ["v*"]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag is not an ancestor of main — refusing to release"
            exit 1
          fi
      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME doesn't match pyproject.toml version $TOML_VERSION"
            exit 1
          fi

  live-clarion-release-check:
    needs: [ci, validate-tag]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check scheduled Live Clarion integration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch origin main --depth=200
          LAST_CONTRACT_SHA=$(git log -1 --format=%H origin/main -- \
            .github/workflows/ci.yml \
            docs/federation/contracts.md \
            docs/federation/registry-backend-launch-runbook.md \
            src/filigree/core.py \
            src/filigree/registry.py \
            src/filigree/sei_backfill.py \
            tests/integration/test_clarion_staging_smoke.py \
            tests/integration/test_clarion_phase_d_e2e.py \
            tests/federation/test_sei_oracle_live_clarion.py)

          if ! RUNS=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/ci.yml/runs" \
            -f event=schedule \
            -f status=success \
            -f per_page=20 \
            --jq '.workflow_runs[] | select(.conclusion == "success") | [.head_sha, .html_url] | @tsv'); then
            echo "::warning title=Live Clarion release checklist::Could not inspect scheduled Live Clarion Integration lane history. Confirm it has passed since Clarion contract changes before publishing federation-sensitive changes."
            exit 0
          fi

          MATCHED_URL=""
          while IFS=$'\t' read -r run_sha run_url; do
            [ -n "$run_sha" ] || continue
            git fetch origin "$run_sha" --depth=1 >/dev/null 2>&1 || true
            if git merge-base --is-ancestor "$LAST_CONTRACT_SHA" "$run_sha" 2>/dev/null; then
              MATCHED_URL="$run_url"
              break
            fi
          done <<< "$RUNS"

          if [ -z "$MATCHED_URL" ]; then
            echo "::warning title=Live Clarion release checklist::No successful scheduled Live Clarion Integration lane was found at or after Clarion contract changes ($LAST_CONTRACT_SHA). Run CI manually with require_live_clarion=true or wait for the scheduled lane before publishing federation-sensitive changes."
          else
            echo "Scheduled Live Clarion Integration proof: $MATCHED_URL"
          fi

  build:
    needs: [ci, validate-tag, live-clarion-release-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  verify:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Wait for PyPI propagation and verify
        run: |
          MAX_ATTEMPTS=10
          SLEEP_SECS=30
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            if VERSION_OUTPUT=$(uvx --from "filigree==${GITHUB_REF_NAME#v}" filigree --version 2>&1); then
              echo "Installed on attempt $attempt"
              echo "$VERSION_OUTPUT"
              exit 0
            fi
            echo "$VERSION_OUTPUT"
            echo "Attempt $attempt/$MAX_ATTEMPTS: package not yet available, waiting ${SLEEP_SECS}s..."
            sleep $SLEEP_SECS
          done
          echo "::error::Package filigree==${GITHUB_REF_NAME#v} not available on PyPI after $((MAX_ATTEMPTS * SLEEP_SECS))s"
          exit 1

  github-release:
    needs: [publish, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* --generate-notes ||
          gh release upload "${{ github.ref_name }}" dist/* --clobber
